      page: 1
  - id: hard-mcts-01
    prompt: In the AlphaZero selection rule \(Q(s,a)+c\,p_\theta(s,a)\frac{\sqrt{\sum_b N(s,b)}}{1+N(s,a)}\), what happens to the prior-based exploration term for a fixed edge as \(N(s,a)\) becomes large?
    choices:
      - It shrinks relative to \(Q(s,a)\), so selection becomes increasingly driven by accumulated statistics
      - It grows without bound and dominates \(Q(s,a)\)
      - It stays constant because priors are fixed
      - It changes sign once the edge is visited enough
    correct_choice: 0
    explanation: The denominator \(1+N(s,a)\) causes the prior bonus to decay for heavily visited edges. Search therefore relies more on backed-up value information as evidence accumulates.
