    prompt: Which statement best distinguishes weak duality from strong duality in a minimization problem?
    choices:
      - Weak duality gives lower bounds from dual-feasible points, while strong duality additionally gives equality of optimal values under extra conditions
      - Weak duality requires KKT, while strong duality never does
      - Weak duality applies only to equality constraints, while strong duality applies only to inequality constraints
      - Weak duality concerns maximization only
    correct_choice: 0
    explanation: Weak duality is the lower-bound statement; strong duality is the gap-closing statement. The distractors confuse this distinction with KKT usage or with the type of constraints involved.
