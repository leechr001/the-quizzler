  - id: hard-bandits-02
    prompt: Which statement best explains why fixed-\(\epsilon\) greedy usually has worse asymptotic regret than UCB?
    choices:
      - Fixed-\(\epsilon\) keeps exploring at a constant rate instead of shrinking exploration with uncertainty
      - Fixed-\(\epsilon\) cannot use empirical means
      - UCB never explores suboptimal arms
      - UCB knows the true reward gaps in advance
    correct_choice: 0
    explanation: The issue is not that \(\epsilon\)-greedy lacks empirical means; it is that it keeps paying a constant exploration tax. UCB adapts the amount of exploration to uncertainty and therefore can achieve much smaller regret.
    tags:
