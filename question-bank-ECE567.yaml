  - id: hard-contrastive-learning-02
    prompt: What is the main effect of lowering the temperature \(\tau\) in an InfoNCE-style loss?
    choices:
      - It makes the softmax focus more heavily on the hardest high-similarity negatives
      - It increases the embedding dimension
      - It turns all negatives into positives
