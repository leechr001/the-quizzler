      - "\\(G^\\prime = \\alpha G\\)"
      - "\\(G^\\prime = G\\) for every potential"
    correct_choice: 0
    explanation: The shaping terms telescope, leaving only endpoint contributions. With terminal potential zero, the shaped return differs from the original by the state-dependent offset \(-\Phi(s_0)\), which preserves action ordering from that state.
