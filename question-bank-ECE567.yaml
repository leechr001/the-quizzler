questions:
  - id: ch1-dp-complexity
    prompt: In a finite-horizon dynamic program with \(T\) stages, dynamic programming stores one optimal future value per state/stage instead of enumerating every full path. How does this scale with \(T\) compared with exclusive search?
    choices:
      - Dynamic programming is linear in \(T\), while exclusive search is exponential in \(T\)
      - Dynamic programming and exclusive search are both exponential in \(T\)
      - Dynamic programming is quadratic in \(T\), while exclusive search is linear in \(T\)
      - Dynamic programming is exponential in \(T\), while exclusive search is linear in \(T\)
    correct_choice: 0
    explanation: Exclusive search enumerates all feasible paths, so its cost grows exponentially with the horizon. Dynamic programming reuses optimal subproblem values, so the chapter emphasizes linear growth in \(T\).
    citation:
      source_file: RL_book.pdf
      page: 5
    tags:
      - dynamic-programming
  - id: ch1-principle-of-optimality
    prompt: Given an optimal solution split into a prefix and a remaining subproblem, what does the principle of optimality say in dynamic programming?
    choices:
      - A subsolution of an optimal solution is optimal for its corresponding subproblem
      - A greedy action is always globally optimal after one step
      - The value function can be computed without any future information
      - Optimal policies do not depend on the current state
    correct_choice: 0
    explanation: 'The principle of optimality is the reason backward search works: once an optimal path reaches a subproblem, the remaining path must itself be optimal for that subproblem.'
    citation:
      source_file: RL_book.pdf
      page: 5
    tags:
      - dynamic-programming
  - id: ch1-bellman-next-value
    prompt: In the Bellman equation \(V_k(j) = \max_{i \in N_k(j)} (r_k(j,i) + V_{k+1}(i))\), what future quantity does \(V_{k+1}(i)\) represent after moving from \(j\) to \(i\)?
    choices:
      - The maximum cumulative reward from next-stage node \(i\) to the destination
      - The immediate reward for moving from \(j\) to \(i\)
      - The probability of selecting action \(i\)
      - The number of outgoing edges from node \(i\)
    correct_choice: 0
    explanation: The Bellman equation combines an immediate reward with the best achievable future reward. Here \(V_{k+1}(i)\) is exactly that optimal future value starting from node \(i\).
    citation:
      source_file: RL_book.pdf
      page: 5
    tags:
      - dynamic-programming
  - id: ch1-backward-forward-method
    prompt: In the backward-forward method for deterministic DP, after Bellman values \(V_k\) are available, what do the two passes do?
    choices:
      - Backward search computes the values, and forward search recovers the optimal actions
      - Backward search samples trajectories, and forward search estimates rewards
      - Backward search chooses actions, and forward search estimates transition kernels
      - Both passes compute the same values from different initializations
    correct_choice: 0
    explanation: The backward pass solves the Bellman equations for the value functions. Once those values are known, the forward pass selects the maximizing action at each stage.
    citation:
      source_file: RL_book.pdf
      page: 7
    tags:
      - dynamic-programming
  - id: ch1-knapsack-feasibility
    prompt: In the 0-1 knapsack DP with binary action \(u_k\) and capacity update \(x_{k+1}=x_k-w_k u_k\), what happens when item \(k\) has weight \(w_k > x_k\)?
    choices:
      - The only feasible action is to exclude the item
      - The item must still be included, but with zero reward
      - The state becomes terminal immediately
      - The remaining capacity is reset to zero
    correct_choice: 0
    explanation: If the item is heavier than the remaining capacity, action \(u_k = 1\) is infeasible. The book encodes this by restricting the feasible action set to \(\{0\}\).
    citation:
      source_file: RL_book.pdf
      page: 12
    tags:
      - dynamic-programming
  - id: ch1-shortest-path-loop
    prompt: In a grid shortest-path dynamic program with nonpositive rewards, why is a horizon of \(mn-1\) steps sufficient?
    choices:
      - Any path with a loop is suboptimal because rewards are nonpositive, so removing the loop improves the reward
      - The agent is allowed to move only right and up
      - The destination must always be reached in exactly \(mn-1\) moves
      - The stay action forces all paths to have equal length
    correct_choice: 0
    explanation: Because every square gives a nonpositive reward, revisiting squares through a loop only hurts performance. That lets the chapter bound the useful horizon by the number of grid cells.
    citation:
      source_file: RL_book.pdf
      page: 12
    tags:
      - dynamic-programming
  - id: ch1-stochastic-policy-need
    prompt: In stochastic DP, where \(x_{k+1}\) is sampled from a transition law after action \(u_k\), why is a fixed action sequence not enough?
    choices:
      - Because the state reached at each stage is random, so the action should depend on the current state
      - Because the reward function is always unknown
      - Because discounting is required in every stochastic problem
      - Because a Bellman equation cannot be written for action sequences
    correct_choice: 0
    explanation: In deterministic DP, a fixed optimal sequence can work because the state trajectory is known in advance. In stochastic DP, the agent needs a policy that maps the realized state to an action.
    citation:
      source_file: RL_book.pdf
      page: 15
    tags:
      - dynamic-programming
  - id: ch1-stochastic-bellman-expectation
    prompt: Moving from a deterministic next state to random rewards and transitions, what is the key Bellman-equation change in stochastic DP?
    choices:
      - The future term becomes an expectation over rewards and next states
      - The maximization over actions disappears
      - The value function no longer depends on stage
      - The reward must be discounted even in finite horizon
    correct_choice: 0
    explanation: In stochastic DP, the next reward and next state are random. The Bellman equation therefore uses expected immediate reward plus expected next-state value.
    citation:
      source_file: RL_book.pdf
      page: 15
    tags:
      - dynamic-programming
  - id: ch1-infinite-horizon-time-homogeneous
    prompt: In infinite-horizon discounted DP with Bellman form \(V(x)=\max_u \mathbb{E}[r(x,u)+\alpha V(x')]\), why can the value function be written without a stage index in a time-homogeneous system?
    choices:
      - Because the transition rule, reward function, and stationary policy do not depend on time, so the remaining problem looks the same at every step
      - Because the discount factor makes all future rewards zero after one step
      - Because only deterministic policies are allowed
      - Because backward search starts from infinity
    correct_choice: 0
    explanation: For time-homogeneous systems, starting one step later gives the same infinite-horizon problem. That is why the chapter writes a single stationary Bellman equation \(V(x)\) instead of \(V_k(x)\).
    citation:
      source_file: RL_book.pdf
      page: 24
    tags:
      - dynamic-programming
  - id: ch2-markov-property
    prompt: Using the conditional probability \(P(X_{k+1}\mid X_k,X_{k-1},\ldots)\), what does the Markov property mean for a discrete-time Markov chain?
    choices:
      - Conditioned on the current state, the next state does not depend on older history
      - The next state is deterministic once the initial state is known
      - The state distribution is always stationary
      - The transition matrix must be symmetric
    correct_choice: 0
    explanation: The chapter defines a Markov chain by the fact that the most recent state contains all the information needed to predict the next state. Older history becomes irrelevant once the current state is known.
    citation:
      source_file: RL_book.pdf
      page: 26
    tags:
      - markov-chains
  - id: ch2-transition-matrix-entry
    prompt: For a time-homogeneous Markov chain with transition matrix \(P\), what does the entry \(P_{ij}\) denote?
    choices:
      - The probability of moving from state \(i\) to state \(j\) in one step
      - The long-run fraction of time spent in state \(j\)
      - The reward collected when leaving state \(i\)
      - The probability that state \(j\) is absorbing
    correct_choice: 0
    explanation: The transition probability matrix collects one-step transition probabilities. Its \(i,j\) entry is the probability of being in \(j\) next given that the chain is currently in \(i\).
    citation:
      source_file: RL_book.pdf
      page: 27
    tags:
      - markov-chains
  - id: ch2-distribution-evolution
    prompt: Given the column-vector update \(p_{k+1}=P^\top p_k\), how is the distribution \(p_k\) of a time-homogeneous Markov chain written?
    choices:
      - "\\(p_k = (P^\\top)^k p_0\\)"
      - "\\(p_k = P^k p_0\\)"
      - "\\(p_k = P^{-k} p_0\\)"
      - "\\(p_k = P p_0\\) for every \\(k\\)"
    correct_choice: 0
    explanation: The chapter defines \(p_k\) as a column vector of state probabilities and uses the transpose convention, so the evolution is \(p_{k+1} = P^\top p_k\), hence \(p_k = (P^\top)^k p_0\).
    citation:
      source_file: RL_book.pdf
      page: 27
    tags:
      - markov-chains
  - id: ch2-controlled-markov-chain
    prompt: In a controlled transition law \(P(y|x,u)\), what turns an ordinary Markov chain into a controlled Markov chain?
    choices:
      - The transition probabilities depend on the chosen action
      - The state space becomes continuous
      - Rewards are added to every transition
      - The stationary distribution becomes unique
    correct_choice: 0
    explanation: A controlled Markov chain lets the agent influence transition probabilities through actions. That is the bridge from plain Markov chains to Markov decision processes.
    citation:
      source_file: RL_book.pdf
      page: 28
    tags:
      - markov-chains
      - mdp-planning
  - id: ch2-markov-stationary-policy
    prompt: For discounted MDPs with policies of the form \(u_k=\mu_k(x_k)\), why is it enough to focus on Markov policies and, in time-homogeneous problems, stationary policies?
    choices:
      - Because one Markov policy can be optimal, and time-homogeneous problems let us further focus on stationary policies
      - Because non-Markov policies are always infeasible
      - Because stationary policies are the only ones with finite value
      - Because random policies cannot be analyzed
    correct_choice: 0
    explanation: The chapter states that for finding one optimal policy it is enough to search over Markov policies. Under time-homogeneous settings, this can be reduced further to stationary policies.
    citation:
      source_file: RL_book.pdf
      page: 29
    tags:
      - mdp-planning
  - id: ch2-value-iteration-model
    prompt: In model-based value iteration with backup \(V_{t+1}(x)=\max_u(\bar r(x,u)+\alpha\sum_y P(y|x,u)V_t(y))\), what information is assumed known?
    choices:
      - The transition probabilities and mean rewards for every state-action pair
      - Only the optimal policy
      - Only sample trajectories generated by the environment
      - The stationary distribution of every policy
    correct_choice: 0
    explanation: The value-iteration section is model-based. It assumes the model is known, meaning both the transition kernel and the mean reward function are available.
    citation:
      source_file: RL_book.pdf
      page: 29
    tags:
      - mdp-planning
      - value-iteration
  - id: ch2-value-iteration-stop
    prompt: Using the sup-norm change \(\Delta_t=\max_x |V_t(x)-V_{t-1}(x)|\), what is a common practical stopping rule for value iteration?
    choices:
      - When \(\max_x |V_k(x) - V_{k-1}(x)| < \epsilon\)
      - When the policy stops changing for one state
      - After exactly \(|X|\) iterations
      - When the initial value function becomes zero
    correct_choice: 0
    explanation: The stopping rule measures how much the value function changes from one iteration to the next. Small sup-norm change indicates the iteration is close to convergence.
    citation:
      source_file: RL_book.pdf
      page: 30
    tags:
      - mdp-planning
      - value-iteration
  - id: ch2-policy-iteration-distinction
    prompt: Policy iteration moves between a policy \(\mu\), its value \(V^\mu\), and an improved greedy policy. What key idea distinguishes it from value iteration?
    choices:
      - Policy iteration keeps an explicit policy at each iteration and alternates policy evaluation with policy improvement
      - Policy iteration updates only one state at a time
      - Policy iteration avoids solving Bellman equations
      - Policy iteration works only for deterministic systems
    correct_choice: 0
    explanation: Value iteration iterates directly on values, but policy iteration maintains a concrete policy and improves it step by step. The evaluation step computes the value of the current policy before improving it.
    citation:
      source_file: RL_book.pdf
      page: 34
    tags:
      - mdp-planning
      - policy-iteration
  - id: ch2-model-based-challenges
    prompt: After tabular Bellman backups over \(V(x)\) or \(Q(x,u)\), which pair of issues are the main practical challenges for model-based algorithms?
    choices:
      - Knowing the model is difficult, and tabular methods do not scale to very large or continuous spaces
      - Rewards are always negative, and policies cannot be stationary
      - Discount factors are unknown, and Bellman equations have no solutions
      - Action spaces are finite, and transition matrices are singular
    correct_choice: 0
    explanation: 'The chapter highlights two bottlenecks: model-based methods need transition and reward information, and tabular value storage does not scale well to large or continuous problems.'
    citation:
      source_file: RL_book.pdf
      page: 37
    tags:
      - mdp-planning
  - id: ch3-q-function-meaning
    prompt: For discounted return starting with \(x_0=x\) and first action \(u_0=u\), what does the optimal Q-function \(Q(x,u)\) represent?
    choices:
      - The discounted cumulative reward of taking action \(u\) in state \(x\) and then following the optimal policy
      - The immediate reward of action \(u\) in state \(x\) only
      - The probability that action \(u\) is optimal in state \(x\)
      - The value of state \(x\) under a random policy
    correct_choice: 0
    explanation: 'The chapter defines Q as an action value: the first action is fixed to \(u\), and after that the agent follows the optimal policy. That is why Q depends on both state and action.'
    citation:
      source_file: RL_book.pdf
      page: 38
    tags:
      - q-learning
  - id: ch3-value-from-q
    prompt: Once action values \(Q(x,u)\) are known for all feasible actions \(u\), how is the optimal value function related to the Q-function?
    choices:
      - "\\(V(x) = \\max_u Q(x,u)\\)"
      - "\\(V(x) = \\sum_u Q(x,u)\\)"
      - "\\(V(x) = \\min_u Q(x,u)\\)"
      - "\\(V(x) = Q(x,\\mu(x)) - r(x,\\mu(x))\\)"
    correct_choice: 0
    explanation: The best state value is obtained by choosing the action with the largest action value. This identity is what makes Q-learning directly useful for control.
    citation:
      source_file: RL_book.pdf
      page: 38
    tags:
      - q-learning
  - id: ch3-why-learn-q
    prompt: Given the greedy control rule \(\mu(x)\in\arg\max_u Q(x,u)\), why is learning the Q-function especially convenient when the model is unknown?
    choices:
      - Because the agent can choose the best action by comparing Q-values directly, without needing transition probabilities or mean rewards
      - Because Q-learning automatically reveals the stationary distribution
      - Because Q-values do not depend on the action space
      - Because the value function becomes unnecessary in every RL problem
    correct_choice: 0
    explanation: If Q is known, action selection is just an argmax over actions. By contrast, using only \(V(x)\) would still require model information to decide which action attains that value.
    citation:
      source_file: RL_book.pdf
      page: 39
    tags:
      - q-learning
  - id: ch3-q-learning-target
    prompt: In Q-learning, the sampled target uses \(r + \alpha \max_v \tilde Q(x',v)\) after observing \((x,u,r,x')\). Why is this quantity used in the update?
    choices:
      - It is a sample-based estimate of the Bellman target when the transition model is unknown
      - It forces the behavior policy to be on-policy
      - It removes the need for a learning rate
      - It guarantees that all Q-values are updated simultaneously
    correct_choice: 0
    explanation: The Bellman equation uses an expectation over next states, but Q-learning does not know the transition kernel. It replaces that expectation with the target built from the sampled reward and sampled next state.
    citation:
      source_file: RL_book.pdf
      page: 39
    tags:
      - q-learning
  - id: ch3-learning-rate-role
    prompt: In the Q-learning update \(\tilde Q \leftarrow (1-\beta_k)\tilde Q + \beta_k\,y_k\), what does the learning rate \(\beta_k\) control?
    choices:
      - How aggressively the new estimate replaces the old estimate
      - How many actions are available in each state
      - How much exploration is used by the behavior policy
      - How often the environment resets
    correct_choice: 0
    explanation: Q-learning forms a weighted average between the old Q estimate and the new target. The learning rate determines how much weight the algorithm gives to the new information.
    citation:
      source_file: RL_book.pdf
      page: 39
    tags:
      - q-learning
  - id: ch3-temporal-difference
    prompt: Writing Q-learning as \(\tilde Q(x,u)\leftarrow \tilde Q(x,u)+\beta_k\delta_k\), what is the temporal difference \(\delta_k\)?
    choices:
      - The new target estimate minus the old Q estimate
      - The difference between two consecutive rewards
      - The number of time steps until termination
      - The gap between the target policy and the behavior policy
    correct_choice: 0
    explanation: The chapter defines the temporal difference as \(r + \alpha \max_v \tilde Q(x',v) - \tilde Q(x,u)\). It measures how inconsistent the current estimate is with the Bellman-style target.
    citation:
      source_file: RL_book.pdf
      page: 40
    tags:
      - q-learning
  - id: ch3-one-pair-update
    prompt: After one sampled experience \((x,u,r,x')\), the tabular Q-learning assignment is made to \(\tilde Q(x,u)\). How many state-action entries does it update?
    choices:
      - Exactly one
      - All actions for the current state
      - All states that can transition to the next state
      - All state-action pairs in the table
    correct_choice: 0
    explanation: The chapter explicitly notes that Q-learning updates only the Q-value for the sampled pair \((x,u)\). That is one reason tabular methods can learn incrementally from data.
    citation:
      source_file: RL_book.pdf
      page: 40
    tags:
      - q-learning
  - id: ch3-q-learning-off-policy
    prompt: Q-learning uses a greedy target \(\max_v \tilde Q(x',v)\) even when samples come from a separate behavior policy. Why is it classified as off-policy?
    choices:
      - Because the policy being learned can differ from the policy that generates the experiences
      - Because it never uses rewards collected from the environment
      - Because it requires a stationary distribution
      - Because it updates only one Q entry at a time
    correct_choice: 0
    explanation: Q-learning can learn the optimal target policy from samples produced by some other behavior policy, as long as all state-action pairs are visited sufficiently often.
    citation:
      source_file: RL_book.pdf
      page: 41
    tags:
      - q-learning
  - id: ch3-sarsa-on-policy
    prompt: SARSA uses the target \(r_k+\alpha \tilde Q(x_{k+1},u_{k+1})\), where \(u_{k+1}\) is sampled by the current behavior rule. What makes SARSA on-policy?
    choices:
      - Its update uses the next action actually chosen by the same \(\epsilon\)-greedy policy that generated the data
      - It always chooses the greedy action without exploration
      - It updates all Q-values for the current state
      - It requires the model to be known
    correct_choice: 0
    explanation: SARSA uses \(Q(x_k,u_k)\) in the target, where \(u_k\) is drawn from the current \(\epsilon\)-greedy policy. That means the behavior policy and target policy are the same.
    citation:
      source_file: RL_book.pdf
      page: 42
    tags:
      - sarsa
  - id: ch3-sarsa-updated-pair
    prompt: Given a SARSA transition \((x_{k-1},u_{k-1},r_k,x_k,u_k)\), at iteration \(k\), which state-action pair does SARSA update?
    choices:
      - The previous pair \((x_{k-1}, u_{k-1})\)
      - The current pair \((x_k, u_k)\)
      - Every pair visited in the episode so far
      - Only the greedy action at the current state
    correct_choice: 0
    explanation: The SARSA update uses the new transition and next chosen action to revise the value of the immediately preceding state-action pair. The chapter contrasts this explicitly with Q-learning.
    citation:
      source_file: RL_book.pdf
      page: 42
    tags:
      - sarsa
  - id: ch4-tabular-scalability
    prompt: Tabular RL stores values such as \(Q(x,u)\) separately for every state-action pair. Why does this struggle in large games such as Go?
    choices:
      - The number of states becomes too large to store and update explicitly
      - Rewards are always deterministic in large games
      - Tabular methods require continuous action spaces
      - Bellman equations stop applying in games
    correct_choice: 0
    explanation: The chapter motivates function approximation by pointing to the curse of dimensionality. A huge state space makes a table of state or state-action values computationally impractical.
    citation:
      source_file: RL_book.pdf
      page: 44
    tags:
      - linear-function-approximation
  - id: ch4-linear-fa-form
    prompt: With feature vector \(\phi(x,u)\) and shared parameter vector \(w\), what is the linear function-approximation model for the Q-function?
    choices:
      - "\\(Q(x,u) \\approx w^\\top \\phi(x,u)\\)"
      - "\\(Q(x,u) \\approx \\phi(x,u)^\\top \\phi(x,u)\\)"
      - "\\(Q(x,u) \\approx w + u\\)"
      - "\\(Q(x,u) \\approx \\max_m w_m\\)"
    correct_choice: 0
    explanation: Linear function approximation represents each state-action pair by features \(\phi(x,u)\) and uses a shared weight vector \(w\). The approximation is the inner product between weights and features.
    citation:
      source_file: RL_book.pdf
      page: 44
    tags:
      - linear-function-approximation
  - id: ch4-shared-weight-vector
    prompt: Under linear approximation \(Q(x,u)\approx w^\top\phi(x,u)\), why does learning the weight vector \(w\) determine Q-values for all state-action pairs?
    choices:
      - Because the same weight vector is shared across all pairs, and each pair uses its own feature vector
      - Because every state-action pair has the same feature vector
      - Because the rewards are assumed identical in all states
      - Because the transition model is known exactly
    correct_choice: 0
    explanation: The chapter emphasizes that \(w\) is common for all \((x,u)\). Once \(w\) is known, plugging different feature vectors into \(w^\top \phi(x,u)\) produces every Q estimate.
    citation:
      source_file: RL_book.pdf
      page: 44
    tags:
      - linear-function-approximation
  - id: ch4-generalization-advantage
    prompt: Because \(Q(x,u)\approx w^\top\phi(x,u)\) reuses shared weights across feature vectors, what generalization advantage does linear function approximation have over tabular Q-learning?
    choices:
      - It can estimate Q-values for unseen state-action pairs using learned features and shared weights
      - It guarantees exact optimal Q-values after one update
      - It eliminates the need for exploration
      - It makes the Bellman equation unnecessary
    correct_choice: 0
    explanation: Tabular Q-learning only updates visited entries. Linear approximation can still produce an estimate for an unseen pair because the same learned weights apply to all feature vectors.
    citation:
      source_file: RL_book.pdf
      page: 45
    tags:
      - linear-function-approximation
  - id: ch4-linear-update-direction
    prompt: In linear Q-learning, the weight update has the form \(w\leftarrow w+\beta_k\delta_k(\cdot)\). What multiplies the temporal-difference term?
    choices:
      - The feature vector \(\phi(x,u)\)
      - The transition matrix \(P\)
      - The stationary distribution \(\pi\)
      - The gradient of the reward with respect to the action
    correct_choice: 0
    explanation: The linear-function update has the form \(w \leftarrow w + \beta_k \delta(w)\phi(x,u)\). The feature vector determines which components of the shared parameter vector are nudged.
    citation:
      source_file: RL_book.pdf
      page: 46
    tags:
      - linear-function-approximation
  - id: ch4-nonlinear-extra-quantity
    prompt: For a nonlinear approximator \(Q(x,u;w)\), the update follows a gradient direction rather than a table entry. Compared with tabular Q-learning, what extra quantity must be computed?
    choices:
      - The gradient \(\nabla_w Q(x,u;w)\)
      - The exact stationary distribution of the policy
      - The inverse of the transition matrix
      - The Hessian of the reward function
    correct_choice: 0
    explanation: The nonlinear update still uses a temporal-difference target, but now the parameters are trained through gradient descent on the approximator. That requires the gradient of the Q-network output with respect to its weights.
    citation:
      source_file: RL_book.pdf
      page: 48
    tags:
      - dqn
  - id: ch4-dqn-supervised-label
    prompt: In the supervised-learning view of DQN, a sampled input \((x_k,u_k)\) is paired with a bootstrapped label \(y_k\). What target label is associated with that input?
    choices:
      - "\\(y_k = r_k + \\alpha \\max_v Q(x_{k+1}, v; w)\\), treated as a constant during the update"
      - "\\(y_k = Q(x_k, u_k; w)\\), so the network learns to copy its own output"
      - "\\(y_k = r_k\\) only, ignoring the next state"
      - "\\(y_k = V(x_k)\\), computed from the stationary distribution"
    correct_choice: 0
    explanation: The chapter frames DQN as supervised learning with a bootstrapped label. It also notes that in practice the target is detached so it is treated as a number rather than a function of \(w\).
    citation:
      source_file: RL_book.pdf
      page: 49
    tags:
      - dqn
  - id: ch4-finite-action-architecture
    prompt: For a finite action set \(U\), DQN can evaluate all action values from one state input. Which architecture is usually used?
    choices:
      - Input the state and output a \(|U|\)-dimensional vector of Q-values, one per action
      - Input the action only and output the state value
      - Input the state-action pair and output the full transition matrix
      - Input the next state and output the reward distribution
    correct_choice: 0
    explanation: When the action space is finite, the standard architecture takes only the state as input and outputs all action values at once. The chapter contrasts this with state-action input networks for very large or continuous action spaces.
    citation:
      source_file: RL_book.pdf
      page: 50
    tags:
      - linear-function-approximation
  - id: ch4-experience-replay-purpose
    prompt: DQN trains on mini-batches sampled from a replay buffer \(D=\{(x,u,r,x')\}\). What problem is experience replay mainly introduced to address?
    choices:
      - Successive RL samples are highly correlated, so replay helps decorrelate training data
      - Rewards are too large to fit in memory
      - Actions are continuous and need discretization
      - The policy network has no output for terminal states
    correct_choice: 0
    explanation: Supervised learning methods work best with approximately i.i.d. data, but online RL experiences are strongly correlated. Replay buffers help by mixing older experiences into random mini-batches.
    citation:
      source_file: RL_book.pdf
      page: 49
    tags:
      - dqn
  - id: ch4-target-network-purpose
    prompt: In DQN, targets often use delayed weights \(w^-\) in \(r+\alpha\max_v Q(x',v;w^-)\). Why is a target network used?
    choices:
      - To make the target value less dependent on the current online parameters by updating it only periodically
      - To guarantee exact convergence of deep Q-learning
