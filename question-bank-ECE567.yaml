      page: 1
  - id: hard-contraction-mapping-02
    prompt: Which assumption of the contraction mapping theorem is doing the existence work, not just the rate-of-convergence work?
    choices:
      - Completeness of the metric space
      - Positivity of rewards
      - Linearity of the operator
      - Deterministic transitions
    correct_choice: 0
    explanation: The contraction constant gives uniqueness and geometric shrinkage, but completeness is what guarantees the limit point actually exists inside the space. Reward signs and transition types are not theorem assumptions.
    tags:
