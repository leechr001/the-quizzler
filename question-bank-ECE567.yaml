      page: 1
  - id: hard-zeroth-order-optimization-01
    prompt: The expectation of a symmetric two-point estimator is aligned with the gradient of what object, in general?
    choices:
      - A smoothed version of the objective
      - The exact unsmoothed objective for any \(\mu\)
      - The Hessian of the objective
      - The policy gradient theorem
    correct_choice: 0
    explanation: Random-direction finite-difference methods usually estimate the gradient of a locally smoothed objective, not the exact gradient of the original objective at arbitrary smoothing radius. That is one reason \(\mu\) matters.
    tags:
      - zeroth-order-optimization
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-zeroth-order-optimization-02
    prompt: What is the main tradeoff when choosing the smoothing radius \(\mu\) in a two-point estimator?
    choices:
      - Smaller \(\mu\) reduces smoothing bias but can worsen sensitivity or noise, while larger \(\mu\) does the opposite
      - Smaller \(\mu\) improves both bias and variance simultaneously
      - Larger \(\mu\) removes the need for random directions
      - "\\(\\mu\\) only changes the learning rate, not the estimator"
    correct_choice: 0
    explanation: A very small perturbation probes the objective more locally, but the estimate can become noisier or numerically unstable. A larger perturbation is more stable but estimates the gradient of a more heavily smoothed objective.
    tags:
      - zeroth-order-optimization
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-zeroth-order-optimization-03
    prompt: Which statement about value-only optimization is NOT correct?
    choices:
      - One random two-point query gives an exact full gradient in any dimension
      - Gradients must be estimated from function evaluations
      - Black-box access is useful when backpropagation is unavailable
      - Query complexity often worsens as dimension grows
    correct_choice: 0
    explanation: A two-point query gives only a stochastic directional estimate, not an exact full gradient in general. The other three statements are standard reasons zeroth-order methods are useful but often expensive.
    tags:
      - zeroth-order-optimization
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-contrastive-learning-01
    prompt: If all embeddings collapse to the same vector, what part of the contrastive objective is most directly violated?
    choices:
