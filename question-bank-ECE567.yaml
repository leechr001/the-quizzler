    prompt: Why can naive model-based planning remain hard even when \(P(y\mid x,u)\) and \(\bar r(x,u)\) are known exactly?
    choices:
      - Because exact tabulation, maximization, or integration can become intractable in very large or continuous spaces
      - Because Bellman equations apply only when the model is unknown
      - Because knowing the model removes the need to compute value functions
      - Because planning is impossible unless the policy is stochastic
    correct_choice: 0
    explanation: Model knowledge does not solve the curse of dimensionality. The computational bottleneck can shift from estimation to representation and optimization over large state-action spaces.
