      page: 1
  - id: hard-mcts-02
    prompt: Why are normalized visit counts used as training targets instead of the raw prior \(p_\theta(s,\cdot)\)?
    choices:
      - Search counts reflect an improved policy after lookahead, not just the network pre-search preference
      - Raw priors cannot be normalized
      - Visit counts are guaranteed unbiased Q-values
      - The value head requires them for bootstrapping
    correct_choice: 0
    explanation: The whole point of AlphaZero search is to improve on the raw prior before generating training targets. Visit counts encode that search-improved policy, while the raw prior is only the search starting point.
    tags:
      - mcts
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-mcts-03
    prompt: In a two-player zero-sum backup, why must the sign of the backed-up terminal value depend on which player chose the edge?
    choices:
