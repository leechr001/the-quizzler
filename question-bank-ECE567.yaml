      - The data already contain exact scalar rewards for every response
      - The reference policy is updated to become the reward model
      - DPO replaces optimization with supervised classification on prompts only
    correct_choice: 0
    explanation: DPO folds the preference information directly into a policy optimization loss. That is why it can bypass the separate reward-model stage used in other preference-based pipelines.
