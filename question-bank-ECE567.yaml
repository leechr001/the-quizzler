  - id: hard-dqn-02
    prompt: Which pairing correctly matches the main DQN stabilization tools to the problems they address?
    choices:
      - 'Replay buffer: decorrelate training data; target network: slow the motion of bootstrap targets'
      - 'Replay buffer: make the target unbiased; target network: remove the need for exploration'
      - 'Replay buffer: enforce on-policy learning; target network: estimate the transition kernel'
      - 'Replay buffer: choose greedy actions; target network: compute Monte Carlo returns'
