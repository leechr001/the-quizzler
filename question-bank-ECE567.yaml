      - "\\(\\lambda_i^*>0\\)"
      - "\\(\\lambda_i^*<0\\)"
      - Only \(\lambda_i^*\ge 0\), with no further conclusion
    correct_choice: 0
    explanation: Complementary slackness requires \(\lambda_i^* g_i(x^*)=0\). If the constraint is strictly inactive, the only way to satisfy that product condition is \(\lambda_i^*=0\), not merely nonnegativity.
