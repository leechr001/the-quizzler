  - id: hard-potential-based-reward-shaping-03
    prompt: If two actions from the same state have equal original action values, what can potential-based shaping change?
    choices:
      - Transient learning signals without changing their optimal ordering under the original task
      - The transition kernel itself
      - Which action is truly optimal under the original reward
      - Whether the problem is discounted
    correct_choice: 0
    explanation: Potential-based shaping is useful because it can make learning signals denser while preserving the control objective. It changes the optimization path, not the original optimal-action ordering.
