  - id: hard-average-reward-mdp-01
    prompt: If \(h\) is replaced by \(h+c\mathbf{1}\) in the average-reward optimality equation, what changes?
    choices:
      - Action comparisons stay the same and the gain \(g\) is unchanged
      - The optimal gain becomes \(g+c\)
      - All transition probabilities must be renormalized
      - Blackwell optimality is destroyed
    correct_choice: 0
    explanation: Adding a constant to the bias function shifts every action by the same amount through the next-state term, so action comparisons do not change. That is why relative value is defined only up to an additive constant.
    tags:
      - average-reward-mdp
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-average-reward-mdp-02
    prompt: Which implication is valid under standard finite-MDP conditions?
    choices:
      - Blackwell optimality implies average-reward optimality, but not every average-reward-optimal policy must be Blackwell optimal
      - Average-reward optimality implies Blackwell optimality for every policy
      - Blackwell optimality is unrelated to discounted control
      - A Blackwell-optimal policy must have zero bias function
    correct_choice: 0
    explanation: Blackwell optimality is stronger because it requires optimality for all discounts sufficiently close to one. Average-reward optimality alone does not force that stronger high-discount behavior.
    tags:
      - average-reward-mdp
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-average-reward-mdp-03
    prompt: Which extra property, beyond average-reward optimality, is required for Blackwell optimality?
    choices:
      - The policy remains optimal for all discount factors sufficiently close to one
      - The policy has a unique stationary distribution
      - The bias function is identically zero
      - The Bellman operator is a contraction for discount factor one
    correct_choice: 0
    explanation: Blackwell optimality is about robustness across the high-discount regime, not about uniqueness of the stationary distribution or vanishing bias. That stronger discounted-control requirement is what sets it apart.
    tags:
      - average-reward-mdp
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-duality-kkt-01
    prompt: If a point satisfies stationarity, primal feasibility, dual feasibility, and complementary slackness, which extra assumption is typically needed to conclude global optimality from KKT?
    choices:
      - Convexity together with an appropriate constraint qualification
      - Negative dual variables
      - Deterministic rewards
      - Time homogeneity
    correct_choice: 0
    explanation: KKT conditions by themselves can hold at non-global stationary points in nonconvex problems. Convexity plus a suitable regularity condition is what upgrades them to a full global-optimality characterization.
