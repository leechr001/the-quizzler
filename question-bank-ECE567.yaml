    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-contraction-mapping-03
    prompt: If the contraction modulus changes from \(0.5\) to \(0.99\) but the fixed point stays the same, what changes most directly?
    choices:
      - Convergence is still guaranteed but can become much slower
      - Uniqueness of the fixed point is lost immediately
      - The fixed point must move
      - Bellman backups stop being well defined
    correct_choice: 0
    explanation: A larger modulus closer to one weakens the geometric error bound, so convergence slows down. As long as the modulus remains below one, uniqueness and well-posedness are still intact.
    tags:
      - contraction-mapping
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-ucb-sarsa-01
    prompt: Why is an optimism lemma so useful in the regret proof for UCB-SARSA?
    choices:
      - If optimistic estimates upper-bound the relevant true values, greedy action choice with respect to them is not systematically too pessimistic
      - It removes the learning rate from the update
      - It proves the transition model is known
      - It converts episodic regret into immediate reward variance
    correct_choice: 0
    explanation: Optimism lets the analysis compare the greedy action under the estimate to the truly good action without paying a negative gap. The other choices describe different proof ingredients or entirely different ideas.
