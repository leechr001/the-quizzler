  - id: hard-contraction-mapping-01
    prompt: If \(x\) and \(y\) are both fixed points of a \(\gamma\)-contraction with \(\gamma<1\), which line of reasoning forces uniqueness?
    choices:
      - "\\(d(x,y)=d(Tx,Ty)\\le \\gamma d(x,y)\\), so \\(d(x,y)=0\\)"
      - "\\(d(x,y)\\ge \\gamma d(x,y)\\), so \\(x\\) and \\(y\\) can be different"
      - Bounded rewards imply \(x=y\) directly
      - Monotonicity alone implies uniqueness
    correct_choice: 0
    explanation: Once both points are fixed, contraction shrinks their distance by a factor strictly less than one, which is possible only if that distance is already zero. The other arguments miss the fixed-point-plus-contraction structure.
