  - id: hard-dqn-03
    prompt: Why does DQN with a finite action set usually output a vector of Q-values for one state rather than take a state-action pair as input on every forward pass?
    choices:
      - Because the same state representation can be shared across all actions, making greedy maximization over actions efficient
      - Because state-action input networks cannot represent Q-functions
      - Because replay buffers store only states and never actions
      - Because target networks require one output neuron only
    correct_choice: 0
    explanation: With finitely many actions, a state-only forward pass can produce all action values at once, which is computationally convenient for the max in the target and for greedy control. State-action input networks are still possible, but they are less efficient in this setting.
    tags:
      - dqn
    citation:
