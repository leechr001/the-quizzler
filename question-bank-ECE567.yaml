      - The raw log probability of the preferred response alone
      - The KL divergence between prompts
      - The Fisher information of the policy
    correct_choice: 0
    explanation: 'The DPO objective is driven by a relative comparison: preferred versus rejected, each measured against the same reference policy. Using only the preferred response alone would miss the core pairwise structure.'
