  - id: hard-mdp-planning-01
    prompt: In a discounted time-homogeneous MDP, why is searching over all history-dependent policies unnecessary when proving that an optimal policy exists?
    choices:
      - Because there exists an optimal Markov policy and, under time homogeneity, one can further restrict attention to stationary policies
      - Because history-dependent policies are infeasible by definition
      - Because only deterministic transitions are allowed in model-based planning
      - Because the stationary distribution is always unique
    correct_choice: 0
    explanation: The key structural fact is that the current state can summarize the relevant past, so an optimal policy can be found within the Markov class, and in the time-homogeneous discounted setting within the stationary class. The other choices are much stronger than what is actually needed.
