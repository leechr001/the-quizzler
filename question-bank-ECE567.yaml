      - Visit counts would otherwise fail to sum to one
      - The policy prior already carries the opposite sign
      - The value head outputs only nonnegative numbers
    correct_choice: 0
    explanation: A win for one player is a loss for the other, so zero-sum consistency requires the backed-up sign to depend on the acting player. Visit counts and priors are unrelated to that sign convention.
    tags:
      - mcts
    citation:
      source_file: major_topic_hard_pass
      page: 1
  - id: hard-potential-based-reward-shaping-01
    prompt: In an episodic discounted problem with terminal potential \(\Phi(s_T)=0\), what is the shaped return \(G^\prime\) relative to the original return \(G\) from initial state \(s_0\)?
    choices:
      - "\\(G^\\prime = G - \\Phi(s_0)\\)"
