  - id: hard-bandits-03
    prompt: Which statement is NOT a valid interpretation of bandit regret?
    choices:
      - It is exactly the number of exploratory pulls
      - It is the reward gap to always playing the best arm
      - It accumulates the cost of suboptimal decisions over time
      - It is an expectation taken over the algorithm randomness and reward randomness
    correct_choice: 0
    explanation: Regret counts reward shortfall, not merely how many times exploration occurred. Some exploratory actions may even hit the best arm, and some exploitative actions can still be suboptimal early on.
