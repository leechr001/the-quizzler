  - id: hard-potential-based-reward-shaping-02
    prompt: If a shaping term depends on transitions in a way that cannot be written as \(\alpha\Phi(s^+)-\Phi(s)\), what key guarantee can fail?
    choices:
      - Preservation of optimal policies
      - Existence of Bellman equations
      - Finiteness of the action space
