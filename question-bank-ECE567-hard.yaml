questions:
  - id: midterm24-dpg
    prompt: Suppose the critic has closed form \(Q_w(x,u)=\left(\frac{1}{2}(x+wu)-1\right)^2\) and the parameterized actor has the form \(\mu_{\theta}(x)=\frac{1}{1+e^{-\theta x}}\). What is the deterministic policy gradient estimate over a length-\(K\) trajectory?
    choices:
      - \(\nabla_{\theta}J(\theta)=\sum_{k=0}^{K}\alpha^k\,w\left(\frac{1}{2}(x_k+w\mu_{\theta}(x_k))-1\right)\left(\frac{x_k e^{-\theta x_k}}{(1+e^{-\theta x_k})^2}\right)\)
      - \(\nabla_{\theta}J(\theta)=\sum_{k=0}^{K}\alpha^k\,w\left(\frac{1}{2}(x_0+w\mu_{\theta}(x_0))-1\right)\left(\frac{x_k e^{-\theta x_k}}{(1+e^{-\theta x_k})^2}\right)\)
      - \(\nabla_{\theta}J(\theta)=\mathbb{E}_{x\sim \rho_\theta,\;u\sim \pi_\theta(\cdot\mid x)}\!\left[Q(x,u)\nabla_\theta \log \pi_\theta(u\mid x)\right]\)
      - \(\nabla_{\theta}J(\theta)=\sum_{k=0}^{K}\alpha^k\left[w\left(\frac{1}{2}(x_k+w\mu_{\theta}(x_k))-1\right)\mu_{\theta}(x_k)+\left(\frac{1}{2}(x_k+w\mu_{\theta}(x_k))-1\right)^2\left(\frac{x_k e^{-\theta x_k}}{(1+e^{-\theta x_k})^2}\right)\right]\)
    correct_choice: 0
    explanation: The deterministic policy gradient uses \(\nabla_u Q_w(x_k,u)\vert_{u=\mu_\theta(x_k)}\,\nabla_\theta \mu_\theta(x_k)\) at each time step, weighted by \(\alpha^k\). Here \(\nabla_u Q_w(x_k,u)=w\left(\frac{1}{2}(x_k+wu)-1\right)\) and \(\nabla_\theta \mu_\theta(x_k)=\frac{x_k e^{-\theta x_k}}{(1+e^{-\theta x_k})^2}\).
    citation:
      source_file: midterm-2024.pdf
      page: 6
    tags:
      - deterministic-policy-gradient
      - computation
  - id: hard-cross-01-discounted-vs-average-iteration
    prompt: 'Which statement correctly distinguishes discounted value iteration from average-reward relative value iteration?'
    choices:
      - 'Discounted value iteration relies on the \(\alpha<1\) Bellman operator being a contraction, while relative value iteration normalizes by subtracting a reference-state value because the average-reward bias \(h\) is defined only up to an additive constant.'
      - 'Discounted value iteration must subtract a reference-state value because \(V^*\) is defined only up to a constant, while average-reward value iteration is a contraction whenever the gain \(g\) is positive.'
      - 'Both methods converge for the same reason: the Bellman optimality operator is a contraction in sup norm at \(\alpha=1\).'
      - 'Relative value iteration replaces the Bellman maximization with policy-gradient ascent, while discounted value iteration solves only fixed-policy evaluation.'
    correct_choice: 0
    explanation: 'The correct choice separates two proof mechanisms: discounted control uses contraction from \(\alpha<1\), while average-reward control has a gain-plus-bias equation where \(h+c\mathbf{1}\) is equivalent to \(h\). The distractors either swap the roles, falsely claim contraction at \(\alpha=1\), or confuse model-based dynamic programming with policy-gradient methods.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - value-iteration
      - average-reward-mdp
      - contraction-mapping
  - id: hard-cross-02-bootstrapping-targets
    prompt: 'For a transition \((x,u,r,x^+)\), which target is both off-policy and decouples next-action selection from next-action evaluation in the Double DQN sense?'
    choices:
      - '\(r+\alpha Q_{\theta^-}\!\left(x^+,\arg\max_v Q_\theta(x^+,v)\right)\)'
      - '\(r+\alpha\max_v Q_{\theta^-}(x^+,v)\)'
      - '\(r+\alpha Q_\theta(x^+,u^+)\), where \(u^+\) is the next behavior-policy action'
      - '\(r+\alpha Q_{\theta}\!\left(x^+,\arg\max_v Q_{\theta^-}(x^+,v)\right)\)'
    correct_choice: 0
    explanation: 'Double DQN uses the online network for the argmax and the target network for evaluation. The max over the target network is ordinary DQN-style coupling, the \(u^+\) target is SARSA-style on-policy bootstrapping, and the last option reverses the Double DQN selection/evaluation roles.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - q-learning
      - dqn
      - ddqn
      - sarsa
  - id: hard-cross-03-projected-bellman-error
    prompt: 'In fixed-policy TD with linear approximation \(V_w=\Phi w\) and weighting matrix \(D\), which condition best captures the projected Bellman fixed point rather than exact Bellman consistency?'
    choices:
      - '\(\Phi^\top D\big(T_\mu(\Phi w^*)-\Phi w^*\big)=0\)'
      - '\(T_\mu(\Phi w^*)-\Phi w^*=0\)'
      - '\(\nabla_w\|T_\mu(\Phi w)-\Phi w\|_D^2=0\) with gradients through \(T_\mu\) fully included'
      - '\(\Phi^\top D\big(T^*(\Phi w^*)-\Phi w^*\big)=0\), where \(T^*\) is the max-over-actions optimality operator'
    correct_choice: 0
    explanation: 'Linear TD evaluation generally drives the Bellman error to be orthogonal to the feature space under \(D\), not to be zero state by state. The second choice is exact Bellman consistency, the third is residual-gradient minimization rather than the TD fixed point, and the fourth switches from fixed-policy evaluation to the control operator.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - linear-function-approximation
      - projected-bellman-equation
      - policy-evaluation
  - id: hard-cross-04-stochastic-vs-deterministic-policy-gradient
    prompt: 'Which pairing correctly distinguishes the stochastic policy gradient theorem from deterministic policy gradient?'
    choices:
      - '\(\nabla_\theta J(\theta)=\mathbb{E}[Q^\pi(s,a)\nabla_\theta\log\pi_\theta(a\mid s)]\) for stochastic policies; \(\nabla_\theta J(\theta)=\mathbb{E}[\nabla_\theta\mu_\theta(s)\nabla_a Q^\mu(s,a)|_{a=\mu_\theta(s)}]\) for deterministic policies.'
      - '\(\nabla_\theta J(\theta)=\mathbb{E}[\nabla_\theta Q^\pi(s,a)]\) for stochastic policies; \(\nabla_\theta J(\theta)=\mathbb{E}[Q^\mu(s,\mu_\theta(s))\nabla_\theta\log\mu_\theta(s)]\) for deterministic policies.'
      - '\(\nabla_\theta J(\theta)=\mathbb{E}[A^\pi(s,a)]\) for stochastic policies; \(\nabla_\theta J(\theta)=\mathbb{E}[\max_a Q^\mu(s,a)]\) for deterministic policies.'
      - '\(\nabla_\theta J(\theta)=\mathbb{E}[\nabla_a Q^\pi(s,a)]\) for stochastic policies; \(\nabla_\theta J(\theta)=\mathbb{E}[\nabla_\theta\log\pi_\theta(a\mid s)]\) for deterministic policies.'
    correct_choice: 0
    explanation: 'The stochastic theorem uses the score function because actions are sampled from a differentiable density or mass function. Deterministic policy gradient instead uses a chain rule through the actor output and the critic action-gradient. The wrong choices either differentiate the critic with respect to parameters directly, omit the score/action-gradient structure, or apply a log-probability to a deterministic actor.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - policy-gradient
      - deterministic-policy-gradient
      - reinforce
  - id: hard-cross-05-trust-region-geometry
    prompt: 'A local policy-improvement step linearizes the objective as \(g^\top\Delta\theta\) and constrains policy movement by \(\frac{1}{2}\Delta\theta^\top F\Delta\theta\le \epsilon\), where \(F\) is the Fisher information matrix. Which conclusion is most accurate?'
    choices:
      - 'The natural-gradient direction is proportional to \(F^{-1}g\), and TRPO can be viewed as using this KL-local geometry with an additional feasibility check such as line search.'
      - 'The vanilla gradient direction \(g\) is invariant to reparameterization because Euclidean distance in \(\theta\)-space is the same as KL distance between policies.'
      - 'PPO-Clip solves the same constrained quadratic problem exactly, so clipping gives the same monotonic improvement theorem as TRPO.'
      - 'Soft policy iteration is obtained by setting \(F=I\) and removing entropy regularization from the local objective.'
    correct_choice: 0
    explanation: 'The Fisher matrix is the local quadratic approximation to policy KL, so the constrained linear problem points in the natural-gradient direction. Vanilla gradients are not generally parameterization invariant, PPO-Clip is a practical surrogate rather than the exact TRPO constrained solve, and soft policy iteration is tied to entropy-regularized improvement rather than \(F=I\).'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - natural-policy-gradient
      - trpo
      - ppo
      - soft-policy-iteration
  - id: hard-cross-06-dpo-from-kl-and-bradley-terry
    prompt: 'Starting from \(\pi^*(y\mid x)\propto \pi_{\mathrm{ref}}(y\mid x)\exp(r(x,y)/\beta)\) and a Bradley-Terry preference model, which loss has the DPO logit with the correct preferred-minus-rejected policy-reference comparison?'
    choices:
      - '\(-\log\sigma\!\left(\beta\left[\log\frac{\pi_\theta(y^+\mid x)}{\pi_{\mathrm{ref}}(y^+\mid x)}-\log\frac{\pi_\theta(y^-\mid x)}{\pi_{\mathrm{ref}}(y^-\mid x)}\right]\right)\)'
      - '\(-\log\sigma\!\left(r_\phi(x,y^+)-r_\phi(x,y^-)\right)\)'
      - '\(-\log\sigma\!\left(\beta\left[\log\frac{\pi_\theta(y^-\mid x)}{\pi_{\mathrm{ref}}(y^-\mid x)}-\log\frac{\pi_\theta(y^+\mid x)}{\pi_{\mathrm{ref}}(y^+\mid x)}\right]\right)\)'
      - '\(-\log\sigma\!\left(\beta\left[\log\pi_\theta(y^+\mid x)-\log\pi_\theta(y^-\mid x)\right]\right)\)'
    correct_choice: 0
    explanation: 'DPO substitutes the implicit reward difference induced by policy-reference log ratios into the Bradley-Terry logistic loss. The second choice is reward-model training, the third reverses preferred and rejected, and the fourth omits the reference policy that comes from the KL-regularized derivation.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - dpo
      - rlhf
      - reward-modeling
  - id: hard-cross-07-shaping-vs-advantage
    prompt: 'Which expression gives policy-invariant potential-based shaping in a discounted MDP, and what is the key reason it preserves optimal policies?'
    choices:
      - '\(F(s,a,s^+)=\alpha\Phi(s^+)-\Phi(s)\), because \(\sum_{t=0}^{T-1}\alpha^tF(s_t,a_t,s_{t+1})=-\Phi(s_0)+\alpha^T\Phi(s_T)\) telescopes into endpoint terms.'
      - '\(F(s,a,s^+)=\Phi(s^+)+\Phi(s)\), because adding a state potential to every reward always preserves all action gaps.'
      - '\(F(s,a,s^+)=A^\pi(s,a)=Q^\pi(s,a)-V^\pi(s)\), because using any advantage function as reward shaping preserves optimal policies for every policy \(\pi\).'
      - '\(F(s,a,s^+)=\alpha V^*(s^+)-Q^*(s,a)\), because subtracting an optimal action value makes every policy equally optimal.'
    correct_choice: 0
    explanation: 'The discounted potential difference telescopes, so it changes returns by endpoint offsets rather than arbitrary path-dependent incentives. The other formulas either fail to telescope in the required way, depend on a particular policy advantage rather than a potential, or destroy rather than preserve meaningful action comparisons.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - potential-based-reward-shaping
      - mdp-planning
      - dynamic-programming
  - id: hard-cross-08-contrastive-goal-q
    prompt: 'In contrastive goal-conditioned RL, suppose a classifier score satisfies \(f^*(s,a,g)=\log\frac{p^\pi(g\mid s,a)}{\rho(g)}\). Which conclusion correctly connects the score to action selection for a fixed goal \(g\)?'
    choices:
      - '\(Q^\pi(s,a,g)=p^\pi(g\mid s,a)=e^{f^*(s,a,g)}\rho(g)\), so \(\arg\max_a f^*(s,a,g)=\arg\max_a Q^\pi(s,a,g)\).'
      - '\(Q^\pi(s,a,g)=\sigma(f^*(s,a,g))\), so \(\arg\max_a f^*(s,a,g)\) changes whenever \(\rho(g)\ne \tfrac12\).'
      - '\(Q^\pi(s,a,g)=f^*(s,a,g)+\rho(g)\), so the learned score is an additive value estimate rather than a log-density ratio.'
      - '\(Q^\pi(s,a,g)=\frac{\rho(g)}{e^{f^*(s,a,g)}}\), so the best action minimizes the contrastive score.'
    correct_choice: 0
    explanation: 'Exponentiating the log-density ratio recovers the future-goal probability up to the fixed goal prior \(\rho(g)\), and that positive constant does not change action ordering. The other options confuse the logistic classifier probability with the density-ratio score, make the relation additive, or invert the ratio.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - contrastive-learning
      - goal-conditioned-rl
  - id: hard-cross-09-blackwell-average-reward
    prompt: 'Which statement best captures the relationship between Blackwell optimality, average-reward optimality, and the relative value function?'
    choices:
      - 'Blackwell optimality implies average-reward optimality, but it is stronger because it also selects policies that remain discounted-optimal for all \(\alpha\) sufficiently close to \(1\), often resolving ties through bias or relative-value terms.'
      - 'Average-reward optimality implies Blackwell optimality because the Bellman operator becomes a contraction at \(\alpha=1\).'
      - 'Blackwell optimality is weaker than average-reward optimality because it ignores the gain and optimizes only the transient bias \(h\).'
      - 'All average-reward-optimal policies have the same relative value function \(h\), so the high-discount limit cannot distinguish between them.'
    correct_choice: 0
    explanation: 'Blackwell optimality is a high-discount robustness property, so it implies average-reward optimality but not conversely. The contraction claim at \(\alpha=1\) is false in general, Blackwell optimality does not ignore gain, and average-reward ties can differ in bias.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - average-reward-mdp
      - relative-value
      - blackwell-optimality
  - id: hard-cross-10-cmdp-kkt-slackness
    prompt: 'For a CMDP written as \(\max_\pi J(\pi)\) subject to \(C(\pi)\ge \rho\), use the Lagrangian \(L(\pi,\lambda)=J(\pi)+\lambda(C(\pi)-\rho)\) with \(\lambda\ge 0\). Which KKT interpretation of the safety constraint is correct?'
    choices:
      - '\(\lambda^*(C(\pi^*)-\rho)=0\): if the safety constraint is slack then \(\lambda^*=0\), while \(\lambda^*>0\) implies the constraint is active.'
      - '\(\lambda^*(C(\pi^*)-\rho)\ge 0\): if the safety constraint is slack then \(\lambda^*>0\), because unused safety budget should be rewarded.'
      - '\(\nabla_\pi C(\pi^*)=0\): complementary slackness requires the safety utility itself to be stationary.'
      - '\(C(\pi^*)=\rho\) for every optimal policy: primal feasibility and strong duality force every safety constraint to be active.'
    correct_choice: 0
    explanation: 'Complementary slackness says the multiplier and slack cannot both be positive. A slack safety constraint has zero shadow price; a positive multiplier means the constraint binds. The other choices confuse complementary slackness with sign feasibility, stationarity of the constraint function, or the false claim that all feasible constraints must bind.'
    citation:
      source_file: hard_exam_calibration
      page: 1
    tags:
      - cmdp
      - safe-rl
      - duality-kkt
